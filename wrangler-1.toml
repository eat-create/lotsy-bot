name = "lotsy-bot"
main = "src/index.js"
compatibility_date = "2026-04-19"

# Secrets are configured via Cloudflare dashboard (not in this file)
# Required secrets:
#   TELEGRAM_BOT_TOKEN
#   ALLOWED_USERS
#   SUPABASE_URL
#   SUPABASE_SERVICE_ROLE_KEY

# ============================================================================
# CRON TRIGGERS — 3 check rounds per day (times in UTC)
# ----------------------------------------------------------------------------
# Kyle is in US Central (UTC-5 CDT in summer / UTC-6 CST in winter).
# Cron time is a FIXED anchor per window; the handler adds 0-15 min jitter.
#
# Morning window:   13:15 UTC = 08:15 AM CDT / 07:15 AM CST
# Afternoon window: 19:40 UTC = 02:40 PM CDT / 01:40 PM CST
# Evening window:   01:25 UTC = 08:25 PM CDT / 07:25 PM CST
# ============================================================================
[triggers]
crons = [
  "15 13 * * *",
  "40 19 * * *",
  "25 1 * * *"
]
